<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0f1b2d" />
<title>PoolFlow Planner</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./css/style.css" />
</head>
<body>
<div id="app">
  <!-- ===== Top bar ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-label="PoolFlow Planner logo"></span>
      <div class="brand-text">
        <span class="brand-name">PoolFlow</span>
        <span class="brand-sub">Planner</span>
      </div>
    </div>

    <div class="project-meta">
      <input id="projName" class="proj-name" type="text" placeholder="Untitled Project" aria-label="Project name" />
      <input id="projClient" class="proj-client" type="text" placeholder="Client / Address" aria-label="Client and address" />
    </div>

    <div class="topbar-actions">
      <button id="btnProjects" class="btn" title="Projects">Projects</button>
      <button id="btnSave" class="btn" title="Save now">Save</button>
      <button id="btnExportPdf" class="btn btn-accent" title="Export PDF plan sheet">Export PDF</button>
      <button id="btnMenu" class="btn icon-btn" aria-label="More" title="More">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== Body: palette | canvas | inspector ===== -->
  <div class="workspace">
    <!-- Palette -->
    <aside class="palette" id="palette" aria-label="Component palette">
      <div class="palette-scroll" id="paletteScroll"></div>
    </aside>

    <!-- Mobile palette toggle -->
    <button id="paletteToggle" class="palette-toggle" aria-label="Toggle palette">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>

    <!-- Canvas -->
    <main class="canvas-wrap" id="canvasWrap">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>

      <!-- Floating canvas controls -->
      <div class="canvas-tools">
        <button id="toolSelect" class="ctool active" title="Select / move" aria-label="Select tool">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3l7 17 2.5-6.5L20 11z"/></svg>
        </button>
        <button id="toolPipe" class="ctool" title="Draw pipe" aria-label="Pipe tool">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 18v-5a4 4 0 0 1 4-4h6"/><path d="M20 6v5a4 4 0 0 1-4 4h-2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="6" r="2"/></svg>
        </button>
        <button id="toolHand" class="ctool" title="Pan" aria-label="Pan tool">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 0 1 4 0v6a8 8 0 0 1-8 8h-2a8 8 0 0 1-7-4l-3-5a2 2 0 0 1 3.4-2L6 14"/></svg>
        </button>
      </div>

      <div class="zoom-tools">
        <button id="snapToggle" class="ztool snap-on" title="Toggle snap to grid">Snap</button>
        <button id="zoomOut" class="ztool" aria-label="Zoom out">&minus;</button>
        <span id="zoomLabel" class="zoom-label">100%</span>
        <button id="zoomIn" class="ztool" aria-label="Zoom in">+</button>
        <button id="zoomFit" class="ztool" title="Fit to screen" aria-label="Fit">Fit</button>
      </div>

      <!-- Pipe drawing hint -->
      <div id="pipeHint" class="pipe-hint" hidden>
        Tap a component to start, tap to add bends, tap a component to finish &middot;
        <button id="pipeCancel" class="link-btn">Cancel</button>
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state">
        <div class="empty-card">
          <span class="empty-logo"></span>
          <h2>Start your plumbing plan</h2>
          <p>Drag pool, spa, fittings and equipment from the palette onto the grid. Connect them with the pipe tool, label sizes, then export a clean PDF plan sheet.</p>
        </div>
      </div>
    </main>

    <!-- Inspector -->
    <aside class="inspector" id="inspector" aria-label="Properties" hidden>
      <div class="inspector-head">
        <span id="inspTitle">Properties</span>
        <button id="inspClose" class="icon-btn small" aria-label="Close panel">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="inspector-body" id="inspBody"></div>
    </aside>
  </div>
</div>

<!-- ===== Modals ===== -->
<div id="modalLayer" class="modal-layer" hidden></div>

<!-- toast -->
<div id="toast" class="toast" hidden></div>

<input type="file" id="importFile" accept="application/json,.json" hidden />

<script src="./lib/jspdf.umd.min.js"></script>
<script src="./js/icons.js"></script>
<script src="./js/catalog.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
