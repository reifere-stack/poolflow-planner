<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#01696f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PoolFlow" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <title>PoolFlow Planner</title>
  <meta name="description" content="iPhone-friendly pool & spa plumbing planner. Drag-and-drop equipment, pipes, valves, spillovers. Export PDF/JSON for plumbers." />
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
  <style>
    /* ===== THEME ===== */
    :root, [data-theme="light"] {
      --bg:#f4f5f7; --surface:#ffffff; --surface2:#f9fafb; --offset:#eceef2;
      --border:#d8dbe0; --text:#181a1f; --muted:#6b7280;
      --primary:#01696f; --primary2:#0c4e54;
      --blue:#1f6feb; --purple:#7c4dff; --orange:#e07b00; --warning:#964219;
      --gold:#d19900; --success:#1f7a3a; --error:#c0392b; --error-bg:#fdecea;
      --pipe-suction:#1f6feb; --pipe-return:#e23b56; --pipe-spillover:#7c4dff;
      --pipe-feature:#e07b00; --pipe-conduit:#9aa0a6; --pipe-gas:#d19900; --pipe-drain:#3a4a5c;
      --pipe-air:#0ea5b7;
      /* Source-traced pipe colors — used in Trace Mode to color pipes by what
         fixture they originate from (suction) or terminate at (return). */
      --src-skimmer:#22c55e;  --src-drain:#1a1a1a;  --src-return:#2563eb;
      --src-jet:#dc2626;      --src-bubbler:#06b6d4; --src-deckjet:#a855f7;
      --src-sheer:#0d9488;    --src-slide:#f97316;  --src-feature:#ec4899;
      --src-autofill:#7dd3fc; --src-light:#fde047;  --src-mixed:#6b7280;
      --shadow:0 6px 22px rgba(0,0,0,.08);
      --r:14px; --r-sm:10px;
      --sheet-bg:rgba(255,255,255,0.96);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    [data-theme="dark"] {
      --bg:#0e1014; --surface:#161a20; --surface2:#1c2027; --offset:#22262d;
      --border:#2f343c; --text:#e7e9ed; --muted:#9aa0a6;
      --primary:#4f98a3; --primary2:#2c7e8a;
      --blue:#6ca9de; --purple:#a86fdf; --orange:#fdab43;
      --gold:#efc65d; --success:#79b95b; --error:#e57373; --error-bg:#3a2222;
      --shadow:0 10px 30px rgba(0,0,0,.4);
      --sheet-bg:rgba(22,26,32,0.95);
      /* Slightly brighter source colors for dark mode legibility */
      --src-skimmer:#4ade80;  --src-drain:#e5e7eb;  --src-return:#60a5fa;
      --src-jet:#f87171;      --src-bubbler:#22d3ee; --src-deckjet:#c084fc;
      --src-sheer:#2dd4bf;    --src-slide:#fb923c;  --src-feature:#f472b6;
      --src-autofill:#bae6fd; --src-light:#fde047;  --src-mixed:#9ca3af;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin:0; padding:0; height:100%; overflow:hidden;
      background:var(--bg); color:var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      font-size:15px; line-height:1.4;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      touch-action: none;
    }
    button, input, select, textarea { font:inherit; color:inherit; }
    button { cursor:pointer; background:none; border:none; padding:0; }
    input, select, textarea { -webkit-appearance:none; appearance:none; }

    /* ===== ROOT LAYOUT ===== */
    .app {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      padding-top: var(--safe-top);
    }

    /* ===== TOP BAR ===== */
    .topbar {
      display:flex; align-items:center; gap:8px;
      padding:8px 10px; background:var(--surface);
      border-bottom:1px solid var(--border);
      min-height:52px;
      z-index:30;
    }
    .topbar .brand {
      display:flex; align-items:center; gap:8px;
      font-weight:700; font-size:16px;
    }
    .topbar .brand svg { width:26px; height:26px; color:var(--primary); flex-shrink:0; }
    .topbar .brand-text { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .topbar .spacer { flex:1; }
    .icon-btn {
      width:40px; height:40px; border-radius:10px;
      background:var(--offset); color:var(--text);
      display:inline-flex; align-items:center; justify-content:center;
      border:1px solid transparent;
      transition: background .15s;
    }
    .icon-btn:active { background:var(--border); }
    .icon-btn.on { background:var(--primary); color:#fff; border-color:var(--primary); }
    .icon-btn.on:active { background:var(--primary2); }
    .icon-btn.primary { background:var(--primary); color:#fff; }
    .icon-btn.primary:active { background:var(--primary2); }
    .icon-btn svg { width:22px; height:22px; }
    .status-pill {
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 10px; border-radius:999px;
      font-size:12px; font-weight:600;
      background:var(--offset); color:var(--text);
      max-width:170px;
    }
    .status-pill .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .status-pill.ok .dot { background:var(--success); }
    .status-pill.err .dot { background:var(--error); }
    .status-pill .label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ===== PAGE TABS (Diagram | Flows) ===== */
    .page-tabs {
      display:flex; align-items:stretch;
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:0 var(--space-3);
      flex-shrink:0;
    }
    .page-tabs button {
      appearance:none; -webkit-appearance:none;
      background:transparent; border:0;
      color:var(--muted); font-weight:600; font-size:14px;
      padding:12px 16px; cursor:pointer;
      border-bottom:2px solid transparent;
      transition:color .15s, border-color .15s;
    }
    .page-tabs button.active {
      color:var(--primary);
      border-bottom-color:var(--primary);
    }
    .page-tabs button:hover:not(.active) { color:var(--text); }

    /* ===== FLOWS PAGE ===== */
    .flows-page {
      display:none;
      flex:1; overflow-y:auto;
      padding:16px 16px 120px;
      background:var(--bg);
    }
    body.page-flows .flows-page { display:block; }
    body.page-flows .canvas-area,
    body.page-flows .sheet,
    body.page-flows .hud,
    body.page-flows #connectBtn { display:none !important; }
    body.page-flows .add-flow-btn { display:flex; }

    .flows-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:12px;
    }
    .flows-header h2 {
      margin:0; font-size:18px; font-weight:700; color:var(--text);
    }
    .flows-header .flows-hint {
      font-size:12px; color:var(--muted);
    }

    .flow-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      margin-bottom:14px;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    .flow-card-head {
      display:flex; align-items:center; gap:8px;
      margin-bottom:12px;
    }
    .flow-card-title {
      flex:1; min-width:0;
      font-weight:700; font-size:15px; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .flow-card-actions {
      display:flex; gap:6px;
    }
    .flow-card-actions button {
      appearance:none; -webkit-appearance:none;
      background:var(--offset); color:var(--text);
      border:1px solid var(--border);
      border-radius:8px;
      padding:6px 10px; font-size:12px; font-weight:600;
      cursor:pointer;
    }
    .flow-card-actions button.danger { color:var(--error); border-color:var(--error); background:transparent; }
    .flow-card-actions button.primary { background:var(--primary); color:#fff; border-color:var(--primary); }

    .flow-chain {
      display:flex; flex-direction:column; align-items:stretch; gap:0;
    }
    .flow-step {
      display:flex; align-items:center; gap:10px;
      padding:12px 14px;
      background:var(--offset);
      border:1px solid var(--border);
      border-radius:12px;
      font-size:14px; font-weight:600; color:var(--text);
      min-height:48px;
    }
    .flow-step .step-icon {
      width:28px; height:28px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      border-radius:6px; background:var(--surface);
      color:var(--primary);
    }
    .flow-step .step-icon svg { width:20px; height:20px; }
    .flow-step .step-label {
      flex:1; min-width:0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .flow-step .step-meta {
      font-size:11px; color:var(--muted); font-weight:500;
      white-space:nowrap;
    }
    .flow-step .step-remove {
      display:none;
      appearance:none; -webkit-appearance:none;
      background:transparent; border:0;
      color:var(--error); cursor:pointer;
      font-size:18px; line-height:1;
      padding:4px 8px;
    }
    .flow-card.editing .flow-step { border-color:var(--primary); }
    .flow-card.editing .flow-step .step-remove { display:block; }

    .flow-arrow {
      display:flex; align-items:center; justify-content:center;
      height:22px; color:var(--muted);
      font-size:16px; line-height:1;
      position:relative;
    }
    .flow-insert {
      display:none;
      position:absolute; top:50%; left:50%;
      transform:translate(-50%, -50%);
      width:24px; height:24px; border-radius:50%;
      background:var(--primary); color:#fff;
      border:0; font-size:16px; font-weight:700; line-height:1;
      cursor:pointer;
      box-shadow:0 1px 3px rgba(0,0,0,.2);
    }
    .flow-card.editing .flow-insert { display:flex; align-items:center; justify-content:center; }
    .flow-card.editing .flow-arrow { height:28px; }

    .flows-empty {
      text-align:center; padding:40px 20px;
      color:var(--muted); font-size:14px;
    }
    .flows-empty p { margin:4px 0; }

    .add-flow-btn {
      display:none;
      position:fixed; right:20px; bottom:20px;
      align-items:center; gap:6px;
      padding:14px 20px; border-radius:999px;
      background:var(--primary); color:#fff;
      border:0; font-weight:700; font-size:14px;
      cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.18);
      z-index:50;
    }

    /* ===== iPhone / narrow viewport: tighter Flows page ===== */
    @media (max-width: 480px) {
      .flows-page { padding:10px 8px 140px; }
      .flows-header {
        flex-wrap:wrap; gap:6px;
        margin-bottom:10px;
      }
      .flows-header h2 { font-size:16px; }
      .flows-header .flows-hint { font-size:11px; flex-basis:100%; order:3; }
      .flow-card { padding:10px 8px; margin-bottom:10px; border-radius:12px; }
      .flow-card-head { margin-bottom:8px; gap:6px; }
      .flow-card-title { font-size:14px; }
      .flow-card-actions button { padding:5px 8px; font-size:11px; }
      .add-flow-btn {
        right:12px; bottom:12px;
        padding:11px 16px; font-size:13px;
      }
      /* Demo-load button shrinks too so the header stays one line */
      #loadPoolSpaBtn { padding:6px 10px; font-size:11px; }
    }

    /* ===== CANVAS ===== */
    .canvas-area {
      flex:1; position:relative; overflow:hidden;
      background:
        linear-gradient(180deg, var(--offset), var(--bg));
      touch-action:none;
    }
    .canvas-area .viewport {
      position:absolute; inset:0;
      overflow:hidden;
    }
    .world {
      position:absolute; top:0; left:0;
      width:4000px; height:3000px;
      transform-origin: 0 0;
      will-change: transform;
    }
    .grid-bg {
      position:absolute; inset:0;
      background-image:
        linear-gradient(to right, var(--border) 1px, transparent 1px),
        linear-gradient(to bottom, var(--border) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity:.35;
      pointer-events:none;
    }
    .grid-bg::before {
      content:""; position:absolute; inset:0;
      background-image:
        linear-gradient(to right, var(--text) 1px, transparent 1px),
        linear-gradient(to bottom, var(--text) 1px, transparent 1px);
      background-size: 120px 120px;
      opacity:.08;
    }
    svg.layer { position:absolute; top:0; left:0; width:100%; height:100%; overflow:visible; pointer-events:none; }
    svg.layer.edges { z-index:2; }
    svg.layer.dims  { z-index:3; }

    /* Nodes */
    .node {
      position:absolute;
      background:var(--surface); color:var(--text);
      border:2px solid var(--border);
      border-radius:12px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:6px 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
      cursor:grab;
      touch-action:none;
      user-select:none; -webkit-user-select:none;
      z-index:4;
      min-width:54px; min-height:46px;
      gap:2px;
    }
    .node .icon { width:28px; height:28px; color:var(--primary); flex-shrink:0; }
    .node .icon svg { width:100%; height:100%; }
    .node .title { font-weight:700; font-size:12px; line-height:1.1; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
    .node .meta  { font-size:10px; color:var(--muted); line-height:1.1; text-align:center; }
    .node.large .title { font-size:14px; }
    .node.large .icon { width:36px; height:36px; }

    /* Compact fixtures: icon-only chip; label hidden until selected/hovered. */
    .node.compact-node {
      min-width:0; min-height:0;
      padding:1px;
      gap:0;
      border-radius:6px;
      border-width:1.5px;
      background:#fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }
    .node.compact-node .icon {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
    }
    .node.compact-node .icon svg { width:90%; height:90%; }
    .node.compact-node .compact-label {
      position:absolute;
      top:calc(100% + 2px); left:50%; transform:translateX(-50%);
      font-size:9px; font-weight:600; line-height:1;
      color:var(--text);
      white-space:nowrap;
      pointer-events:none;
      opacity:0;
      transition:opacity .12s ease;
      background:rgba(255,255,255,.92);
      padding:1px 4px; border-radius:4px;
      max-width:120px; overflow:hidden; text-overflow:ellipsis;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      z-index:5;
    }
    .node.compact-node.selected .compact-label,
    .node.compact-node:hover .compact-label {
      opacity:1;
    }

    .node.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 30%, transparent), 0 4px 14px rgba(0,0,0,.16);
    }
    .node.connect-source { border-color: var(--gold); box-shadow: 0 0 0 3px color-mix(in srgb, var(--gold) 35%, transparent); }
    .node.dragging { opacity:.85; cursor:grabbing; z-index:99; }

    .node.body-pool { background: color-mix(in srgb, var(--blue) 12%, var(--surface)); border-color: var(--blue); }
    .node.body-spa  { background: color-mix(in srgb, var(--purple) 12%, var(--surface)); border-color: var(--purple); }
    .node.body-pad  { background: var(--offset); border-style:dashed; }
    .node.valve     { background: color-mix(in srgb, var(--gold) 14%, var(--surface)); border-color: var(--gold); }
    .node.valve.closed-state { background: color-mix(in srgb, var(--error) 14%, var(--surface)); border-color: var(--error); }
    .node.tee       { background: var(--surface2); }

    /* 3-way valve: visible T-body with 3 labelled ports */
    .node.valve3-node {
      padding: 0;
      overflow: visible;
    }
    .node.valve3-node .valve3-body {
      position: absolute; inset: 8px;
      width: calc(100% - 16px); height: calc(100% - 16px);
      pointer-events: none;
    }
    .node.valve3-node .valve3-body .leg {
      stroke: color-mix(in srgb, var(--gold) 55%, transparent);
      stroke-width: 6;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
    }
    .node.valve3-node .valve3-body .leg-open  { stroke: var(--gold); }
    .node.valve3-node .valve3-body .leg-closed { stroke: color-mix(in srgb, var(--gold) 30%, transparent); }
    .node.valve3-node .valve3-body .leg-trunk { stroke: var(--gold); }
    .node.valve3-node .valve3-body .valve3-hub {
      fill: var(--surface);
      stroke: var(--gold);
      stroke-width: 2.4;
      vector-effect: non-scaling-stroke;
    }
    .node.valve3-node .valve3-title {
      position: absolute; left: 0; right: 0; top: 4px;
      text-align: center; font-weight: 700; font-size: 11px;
      pointer-events: none;
      color: var(--text);
      text-shadow: 0 0 4px var(--surface), 0 0 4px var(--surface);
    }
    .node.valve3-node .valve3-state {
      position: absolute; left: 0; right: 0; bottom: -16px;
      text-align: center; font-size: 10px; color: var(--muted);
      pointer-events: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .node.valve3-node .valve3-port {
      position: absolute;
      display: flex; align-items: center; gap: 3px;
      pointer-events: auto;
      cursor: pointer;
      font-size: 10px; color: var(--text);
      touch-action: manipulation;
    }
    .node.valve3-node .valve3-port:active .port-dot {
      transform: scale(.9);
    }
    .node.valve3-node .valve3-port .port-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid color-mix(in srgb, var(--gold) 55%, transparent);
      color: var(--gold);
      font-weight: 800; font-size: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.15);
    }
    .node.valve3-node .valve3-port.open .port-dot {
      background: var(--gold); color: #fff; border-color: var(--gold);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--gold) 30%, transparent), 0 1px 2px rgba(0,0,0,.15);
    }
    .node.valve3-node .valve3-port .port-dot {
      transition: transform .08s ease, box-shadow .15s ease;
    }
    .node.valve3-node .valve3-port .port-label {
      max-width: 50px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-shadow: 0 0 4px var(--surface), 0 0 4px var(--surface);
    }
    /* Port positions: trunk bottom-center, A left-middle, B right-middle */
    .node.valve3-node .port-trunk {
      left: 50%; bottom: -4px;
      transform: translate(-50%, 50%);
      flex-direction: column; gap: 1px;
    }
    .node.valve3-node .port-a {
      left: -4px; top: 50%;
      transform: translate(-50%, -50%);
      flex-direction: row-reverse;
    }
    .node.valve3-node .port-a .port-label { text-align: right; }
    .node.valve3-node .port-b {
      right: -4px; top: 50%;
      transform: translate(50%, -50%);
    }

    /* Pump: intake (left) + discharge (right) port chips */
    .node.pump-node { overflow: visible; }
    .node.pump-node .pump-port {
      position: absolute;
      display: flex; align-items: center; gap: 3px;
      pointer-events: none;
      font-size: 9px; font-weight: 700;
      color: var(--text);
    }
    .node.pump-node .pump-port .port-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid;
      font-weight: 800; font-size: 9px;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.15);
    }
    .node.pump-node .pump-port .port-label {
      text-shadow: 0 0 4px var(--surface), 0 0 4px var(--surface);
    }
    .node.pump-node .port-intake {
      left: -4px; top: 50%;
      transform: translate(-50%, -50%);
      flex-direction: row-reverse;
    }
    .node.pump-node .port-intake .port-dot {
      border-color: var(--pipe-suction, #f59e0b);
      color: var(--pipe-suction, #f59e0b);
    }
    .node.pump-node .port-discharge {
      right: -4px; top: 50%;
      transform: translate(50%, -50%);
    }
    .node.pump-node .port-discharge .port-dot {
      border-color: var(--pipe-return, #2563eb);
      color: var(--pipe-return, #2563eb);
    }

    /* valve quick-flip pills (Selected panel) */
    .valve-pills {
      display:flex; gap:6px; flex-wrap:wrap;
      margin:6px 0 4px;
    }
    .valve-pill {
      flex:1 1 0; min-width:64px;
      padding:8px 10px;
      font-size:13px; font-weight:600;
      background:var(--surface, #fff);
      color:var(--text, #111);
      border:1px solid var(--border, #d4d4d8);
      border-radius:8px;
      cursor:pointer;
      touch-action:manipulation;
      transition: background .12s ease, color .12s ease, border-color .12s ease, transform .08s ease;
    }
    .valve-pill:active { transform: scale(0.97); }
    .valve-pill.on {
      background: var(--gold, #d4a23a);
      color:#1a1306;
      border-color: var(--gold, #d4a23a);
      box-shadow: 0 0 0 2px rgba(212,162,58,0.25);
    }

    /* resize handle */
    .node .resize-handle {
      position:absolute; right:-2px; bottom:-2px;
      width:22px; height:22px;
      background:var(--primary); color:#fff;
      border-radius:6px 0 12px 0;
      display:none; align-items:center; justify-content:center;
      touch-action:none;
    }
    .node.selected.resizable .resize-handle { display:flex; }
    .node .resize-handle svg { width:14px; height:14px; }

    /* ===== BOTTOM SHEET ===== */
    .sheet {
      position:absolute; left:0; right:0; bottom:0;
      background: var(--sheet-bg);
      -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
      border-top:1px solid var(--border);
      border-top-left-radius:18px; border-top-right-radius:18px;
      box-shadow: 0 -8px 30px rgba(0,0,0,.12);
      z-index:40;
      transition: transform .28s cubic-bezier(.2,.8,.2,1);
      transform: translateY(calc(100% - 80px - var(--safe-bottom)));
      padding-bottom: var(--safe-bottom);
      max-height: 85vh;
      display:flex; flex-direction:column;
    }
    .sheet.open { transform: translateY(0); }
    .sheet.mid  { transform: translateY(calc(100% - 280px - var(--safe-bottom))); }

    .sheet-handle {
      display:flex; flex-direction:column; align-items:center;
      padding:8px 0 4px; cursor:grab; touch-action:none;
    }
    .sheet-handle .bar { width:42px; height:5px; border-radius:3px; background:var(--border); }

    .sheet-tabs {
      display:flex; padding:0 4px; gap:0;
      border-bottom:1px solid var(--border);
      overflow-x:auto; -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      flex-shrink:0;
    }
    .sheet-tabs::-webkit-scrollbar { display:none; }
    .sheet-tabs button {
      padding:11px 10px; font-size:13px; font-weight:600;
      color:var(--muted);
      white-space:nowrap;
      border-bottom:2px solid transparent;
      margin-bottom:-1px;
      flex-shrink:0;
    }
    .sheet-tabs button.active { color:var(--primary); border-bottom-color:var(--primary); }

    .sheet-body {
      flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
      padding:12px 14px 20px;
    }

    .panel { padding:0; margin-bottom:14px; }
    .panel h3 { margin:0 0 8px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    .group { margin-bottom:14px; }
    .group-title { font-size:11px; font-weight:700; text-transform:uppercase; color:var(--muted); margin-bottom:6px; padding-left:2px; }

    .palette {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
      gap:8px;
    }
    .palette button {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:4px; padding:10px 4px;
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      min-height:72px;
      color:var(--text); font-size:11px; font-weight:600;
      transition: transform .1s, background .1s;
    }
    .palette button:active { transform:scale(.95); background:var(--offset); }
    .palette button .glyph { width:28px; height:28px; color:var(--primary); }
    .palette button .glyph svg { width:100%; height:100%; }
    .palette button .lbl { line-height:1.1; text-align:center; }

    .row { display:flex; gap:8px; align-items:center; }
    .row > * { flex:1; }
    .row.tight { gap:6px; }

    label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:4px; }

    .field input, .field select, .field textarea {
      width:100%; padding:10px 12px;
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      color:var(--text); font-size:15px;
      min-height:44px;
    }
    .field textarea { min-height:60px; resize:vertical; }

    /* Feet/inches combined input */
    .fi-input {
      display:flex; align-items:stretch;
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      overflow:hidden; min-height:44px;
    }
    .fi-input input {
      flex:1; min-width:0; width:100%;
      border:none; background:transparent;
      padding:10px 4px 10px 10px;
      font-size:16px; font-weight:600;
      text-align:right;
      -moz-appearance: textfield;
    }
    .fi-input input::-webkit-outer-spin-button,
    .fi-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .fi-input input:first-child { border-right:1px solid var(--border); }
    .fi-input span {
      display:flex; align-items:center; justify-content:center;
      padding:0 6px 0 2px;
      font-size:16px; color:var(--muted); font-weight:700;
      min-width:16px;
    }

    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      min-height:44px; padding:10px 14px;
      background:var(--surface); color:var(--text);
      border:1px solid var(--border); border-radius:10px;
      font-weight:600; font-size:14px;
      transition: background .12s, transform .08s;
    }
    .btn:active { transform:scale(.97); background:var(--offset); }
    .btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
    .btn.primary:active { background:var(--primary2); }
    .btn.danger { background:var(--error); color:#fff; border-color:var(--error); }
    .btn.full { width:100%; }
    .btn svg { width:18px; height:18px; }

    .chip-row { display:flex; flex-wrap:wrap; gap:6px; }
    .chip {
      padding:8px 12px; border-radius:999px;
      background:var(--surface); border:1px solid var(--border);
      font-size:13px; font-weight:600;
      min-height:36px;
    }
    .chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    .legend { display:grid; grid-template-columns: 1fr 1fr; gap:6px 12px; font-size:12px; }
    .legend .item { display:flex; align-items:center; gap:6px; }
    .legend .swatch { width:18px; height:6px; border-radius:3px; }

    /* Canvas trace-mode HUD legend (positioned absolutely over canvas, top-left under topbar) */
    #legend {
      position:absolute; left:10px; top:10px;
      display:flex; flex-direction:column; gap:4px;
      background:var(--sheet-bg); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
      border:1px solid var(--border); border-radius:10px;
      padding:8px 10px;
      font-size:11px; font-weight:600;
      max-width:160px; z-index:18;
      box-shadow:var(--shadow);
      grid-template-columns:none;
      pointer-events:none;
    }
    #legend[hidden] { display:none; }
    #legend .legend-title { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:2px; }
    #legend .item { display:flex; align-items:center; gap:6px; }
    #legend .swatch { width:16px; height:5px; border-radius:2px; flex-shrink:0; }

    .takeoff-list, .issues-list { display:flex; flex-direction:column; gap:6px; }
    .takeoff-list .row-item, .issues-list .row-item {
      padding:8px 10px; background:var(--surface); border:1px solid var(--border); border-radius:10px;
      font-size:13px; display:flex; justify-content:space-between; gap:8px;
    }
    .issues-list .row-item.err { background:var(--error-bg); border-color:var(--error); color:var(--error); }
    .takeoff-list .qty { font-weight:700; color:var(--primary); }

    /* zoom HUD */
    .hud {
      position:absolute; right:10px; top:10px;
      display:flex; flex-direction:column; gap:6px;
      z-index:20;
    }
    .hud .icon-btn { background:var(--sheet-bg); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); border:1px solid var(--border); }

    /* connect-mode banner */
    .banner {
      position:absolute; left:50%; top:8px; transform:translateX(-50%);
      background:var(--gold); color:#1a1a1a;
      padding:6px 8px 6px 14px; border-radius:999px;
      font-size:13px; font-weight:700;
      z-index:25;
      box-shadow: var(--shadow);
      display:none;
      align-items:center; gap:6px;
      max-width: calc(100vw - 24px);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .banner.show { display:inline-flex; }
    .banner button {
      background:rgba(0,0,0,.18); color:inherit; padding:4px 10px; border-radius:999px;
      font-size:12px; font-weight:700; flex-shrink:0;
    }

    /* SVG flow text */
    .flow-text { fill:var(--text); font-size:11px; font-weight:600; paint-order:stroke; stroke:var(--surface); stroke-width:3px; }
    .dim-text  { fill:var(--text); font-size:11px; font-weight:600; paint-order:stroke; stroke:var(--surface); stroke-width:3px; }

    /* Modal */
    .modal-backdrop {
      position:absolute; inset:0; background:rgba(0,0,0,.4);
      z-index:50; display:none; align-items:center; justify-content:center;
      padding:20px;
    }
    .modal-backdrop.show { display:flex; }
    .modal {
      background:var(--surface); color:var(--text);
      border-radius:14px; padding:18px;
      max-width:420px; width:100%;
      max-height:80vh; overflow-y:auto;
    }
    .modal h3 { margin-top:0; }

    /* ===== DESKTOP ===== */
    @media (min-width: 900px) {
      .sheet {
        position:absolute; top:60px; right:0; bottom:0; left:auto;
        width:380px;
        transform: translateX(0);
        border-top-right-radius:0;
        border-radius:0;
        border-left:1px solid var(--border);
        border-top:none;
        max-height:none;
        padding-bottom:0;
      }
      .sheet-handle { display:none; }
      .canvas-area { margin-right:380px; }
      .hud { right:390px; }
    }

    @media (max-width: 360px) {
      .palette { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
      .topbar { gap:4px; padding:6px 8px; }
      .icon-btn { width:38px; height:38px; }
    }

    .toast {
      position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
      background:var(--text); color:var(--bg);
      padding:10px 16px; border-radius:999px;
      font-size:13px; font-weight:600;
      z-index:60; opacity:0; transition: opacity .25s;
      pointer-events:none; box-shadow:var(--shadow);
      max-width:80vw;
    }
    .toast.show { opacity:1; }
  </style>
</head>
<body>

<div class="app">

  <!-- PAGE TABS -->
  <nav class="page-tabs" id="pageTabs">
    <button type="button" data-page="diagram" class="active">Diagram</button>
    <button type="button" data-page="flows">Flows</button>
  </nav>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 48 48" fill="none" aria-hidden="true"><path d="M8 14c6-6 26-6 32 0-6 6-26 6-32 0Z" stroke="currentColor" stroke-width="3"/><path d="M8 24c6-6 26-6 32 0-6 6-26 6-32 0Z" stroke="currentColor" stroke-width="3" opacity=".75"/><circle cx="36" cy="12" r="4" fill="currentColor"/></svg>
      <span class="brand-text">PoolFlow</span>
    </div>
    <div class="status-pill ok" id="statusPill" title="Validation"><span class="dot"></span><span class="label">Ready</span></div>
    <div class="spacer"></div>
    <button class="icon-btn" id="undoBtn" title="Undo" aria-label="Undo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H9"/></svg>
    </button>
    <button class="icon-btn" id="traceBtn" title="Trace mode — color pipes by source/destination" aria-label="Trace mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2" fill="#22c55e" stroke="none"/><circle cx="18" cy="6" r="2" fill="#2563eb" stroke="none"/><circle cx="6" cy="18" r="2" fill="#dc2626" stroke="none"/><circle cx="18" cy="18" r="2" fill="#1a1a1a" stroke="none"/><path d="M6 8v8M18 8v8M8 6h8M8 18h8"/></svg>
    </button>
    <button class="icon-btn" id="connectBtn" title="Connect pipes" aria-label="Connect">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1"/><path d="M14 10a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1"/></svg>
    </button>
    <button class="icon-btn primary" id="menuBtn" title="Menu" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
  </header>

  <!-- CANVAS -->
  <section class="canvas-area" id="canvasArea">
    <div class="banner" id="connectBanner">
      <span>Tap source, then destination</span>
      <button id="connectCancel">Cancel</button>
    </div>
    <div class="viewport" id="viewport">
      <div class="world" id="world">
        <div class="grid-bg"></div>
        <svg class="layer edges" id="edgeSvg"></svg>
        <svg class="layer dims"  id="dimSvg"></svg>
        <!-- nodes appended here -->
      </div>
    </div>
    <div class="hud">
      <button class="icon-btn" id="zoomIn" aria-label="Zoom in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      </button>
      <button class="icon-btn" id="zoomOut" aria-label="Zoom out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      </button>
      <button class="icon-btn" id="zoomFit" aria-label="Fit to screen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 9V4h5"/><path d="M20 9V4h-5"/><path d="M4 15v5h5"/><path d="M20 15v5h-5"/></svg>
      </button>
    </div>
    <div class="toast" id="toast"></div>
    <div class="legend" id="legend" hidden></div>
  </section>

  <!-- FLOWS PAGE -->
  <section class="flows-page" id="flowsPage">
    <div class="flows-header">
      <h2>Flows</h2>
      <div class="flows-hint">Edit a flow to update the diagram</div>
    </div>
    <div id="flowsList"></div>
  </section>
  <button type="button" class="add-flow-btn" id="addFlowBtn">+ Add Flow</button>

  <!-- BOTTOM SHEET -->
  <aside class="sheet mid" id="sheet">
    <div class="sheet-handle" id="sheetHandle"><div class="bar"></div></div>
    <div class="sheet-tabs" id="sheetTabs">
      <button data-tab="parts" class="active">Parts</button>
      <button data-tab="selected">Selected</button>
      <button data-tab="pipes">Pipes</button>
      <button data-tab="validate">Validate</button>
      <button data-tab="takeoff">Takeoff</button>
      <button data-tab="export">Export</button>
    </div>
    <div class="sheet-body" id="sheetBody"><!-- populated by JS --></div>
  </aside>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modalContent"></div>
  </div>

</div>

<script src="js/icons.js?v=b2fa3eb"></script>
<script src="js/catalog.js?v=b2fa3eb"></script>
<script src="js/app.js?v=b2fa3eb"></script>

</body>
</html>
